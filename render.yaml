services:
  - type: web
    name: team-flow
    runtime: node
    plan: free
    region: oregon
    buildCommand: bun install && bun run build
    startCommand: bun run start
    preDeployCommand: bun run db:push
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: AI_EMBED_MODEL
        value: nvidia/nv-embed-v1
      - key: AI_EMBED_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: AI_EMBED_DIMENSIONS
        value: "1024"
      - key: AI_CHAT_PROVIDER
        value: groq
