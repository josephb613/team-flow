services:
  - type: web
    name: team-flow
    runtime: node
    plan: free
    region: oregon
    buildCommand: bun install && bun run build
    startCommand: bun run start
    preDeployCommand: bun run db:push
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
