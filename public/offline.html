<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>Hors ligne — TeamFlow</title>
    <style>
      :root {
        color-scheme: light dark;
        --brand: #2563eb;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(1200px 600px at 50% -10%, rgba(37, 99, 235, 0.12), transparent 60%),
          #f7f8fb;
        color: #1a2233;
      }
      @media (prefers-color-scheme: dark) {
        body { background: radial-gradient(1200px 600px at 50% -10%, rgba(37, 99, 235, 0.18), transparent 60%), #0c111b; color: #e8edf6; }
        .card { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); }
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid rgba(20, 30, 60, 0.08);
        border-radius: 20px;
        padding: 40px 32px;
        box-shadow: 0 20px 50px -20px rgba(20, 30, 60, 0.25);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 24px -8px rgba(37, 99, 235, 0.6);
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; opacity: 0.7; margin: 0 0 24px; }
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        background: var(--brand);
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        padding: 12px 24px;
        border-radius: 12px;
        transition: filter 0.15s ease, transform 0.15s ease;
      }
      button:hover { filter: brightness(1.05); }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white" fill-opacity="0.95" />
          <path d="M2 17L12 22L22 17" stroke="white" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M2 12L12 17L22 12" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <h1>Vous êtes hors ligne</h1>
      <p>Impossible de joindre TeamFlow pour le moment. Vérifiez votre connexion internet, puis réessayez.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
    <script>
      window.addEventListener('online', () => location.reload());
    </script>
  </body>
</html>
